<title>Page not found — Monk Food</title>
<script>
/* If a URL has a trailing slash (e.g. /admin/), retry without it so
   GitHub Pages serves the matching file (/admin -> admin.html). */
(function () {
  var p = location.pathname;
  if (p.length > 1 && p.charAt(p.length - 1) === "/") {
    location.replace(p.slice(0, -1) + location.search + location.hash);
  }
})();
</script>
