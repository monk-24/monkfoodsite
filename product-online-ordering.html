<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<meta name="robots" content="noindex, nofollow">
<title>Online Ordering — Monk Food</title>
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=2">
<script async src="https://js.stripe.com/v3/buy-button.js"></script>
<style>
  .checkout{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .checkout .card{max-width:520px;width:100%;text-align:center;padding:40px 32px}
  .checkout .ico{width:64px;height:64px;border-radius:16px;background:var(--cream-2);display:grid;place-items:center;font-size:1.8rem;margin:0 auto 20px}
  .checkout h1{font-size:clamp(1.8rem,5vw,2.4rem);margin-bottom:10px}
  .checkout p{color:var(--muted);margin-bottom:26px}
  .checkout .buy{display:flex;justify-content:center;margin-top:8px}
  .checkout .secure{margin-top:22px;font-size:.82rem;color:var(--muted)}
</style>
</head>
<body>

<header class="site-header">
  <div class="container nav" style="justify-content:center">
    <a href="./" class="brand"><img src="assets/logo.png" alt="Monk Food logo"> Monk Food</a>
  </div>
</header>

<section class="checkout">
  <div class="card">
    <div class="ico">🛒</div>
    <h1>Online Ordering</h1>
    <p>Your own branded online ordering platform — set up and ready to take orders. Complete your purchase securely below.</p>
    <div class="buy">
      <stripe-buy-button
        buy-button-id="buy_btn_1Tqw0S0col6vGebuHKF4oCGi"
        publishable-key="pk_live_51TjlpH0col6vGebu8S2Blyht9d5kXQ9tJKTJNzUmDP6gO3B06p7uMSVS6yFT1dmoYUCSvavj0jkU8735eN6ADYgA00AjwENqRp">
      </stripe-buy-button>
    </div>
    <p class="secure">🔒 Secure payment powered by Stripe</p>
  </div>
</section>

</body>
</html>
